services:
  database:
    image: dthieudocker/nl2sql-db:v4
    container_name: nl2sql_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  vector-db:
    image: qdrant/qdrant:latest
    container_name: nl2sql_qdrant
    ports:
      - "6333:6333"  # Dashboard & REST API
      - "6334:6334"  # gRPC (Dùng cho Spring AI kết nối)
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data: